<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>班级相册 - 福州第三十六中学2024级8班</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f7fafe;
            color: #333;
            padding: 20px;
        }
        header {
            background: #1677ff;
            color: #fff;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background: #1677ff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }
        .album {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .album img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .album img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>班级相册</h1>
    </header>
    <div style="text-align: center;">
        <a href="index.html" class="back-btn">← 返回首页</a>
    </div>
    <div class="album">
        <!-- 把你照片的名字，按这个格式一行一个写进去！ -->
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
        <img src="01.png">
        <img src="微信图片_20260408200534_4_20.jpg">
        <img src="微信图片_20260408201213_11_14.jpg">
         <img src="02.png">
         <img src="03.png">
         <img src="04.png">
        <img src="05.png">
        <img src="06.png">
        <img src="08.png">
    </div>
</body>
</html>
