<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>班级相册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            padding: 20px;
            background: #f5f7fa;
            font-family: "Microsoft YaHei", sans-serif;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 32px;
            color: #333;
        }

        .back-btn {
            display: inline-block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background: #1677ff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }

        .album {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .album img {
            width: 100%;
            height: 160px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .album img:hover {
            transform: scale(1.05);
        }

        /* 图片放大遮罩 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 9999;
            text-align: center;
            padding: 20px;
        }

        .modal img {
            max-width: 90%;
            max-height: 90%;
            margin-top: 5%;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .modal.active {
            display: block;
        }
    </style>
</head>

    <!-- 放大预览层 -->
    <div class="modal" id="imgModal" onclick="closeModal()">
        <img id="bigImg">
    </div>

    <script>
        // 点击小图放大
        const imgs = document.querySelectorAll('.album img');
        const modal = document.getElementById('imgModal');
        const bigImg = document.getElementById('bigImg');

        imgs.forEach(img => {
            img.onclick = function () {
                if (this.src) {
                    bigImg.src = this.src;
                    modal.classList.add('active');
                }
            }
        });

        // 点击任意位置关闭放大
        function closeModal() {
            modal.classList.remove('active');
        }
    </script>
