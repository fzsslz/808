    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f7fafe;
            color: #333;
            padding: 20px;
        }
        header {
            background: #1677ff;
            color: #fff;
            padding: 16px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .back-btn {
            display: inline-block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background: #1677ff;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
        }
        .album {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .album img {
            width: 100%;
            height: 160px;
           object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .album img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
