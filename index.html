<style>
.exam-countdown {
  max-width: 500px;
  margin: 30px auto;
  padding: 25px;
  background: #f8f9fa;
  border-radius: 16px;
  text-align: center;
  font-family: "Microsoft YaHei", sans-serif;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.exam-title {
  font-size: 22px;
  color: #2c3e50;
  margin-bottom: 15px;
}
.time-box {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 10px 0;
}
.time-item {
  width: 60px;
  padding: 10px 0;
  background: #fff;
  border-radius: 10px;
}
.time-num {
  font-size: 28px;
  font-weight: bold;
  color: #e74c3c;
}
.time-text {
  font-size: 12px;
  color: #666;
}
.slogan {
  margin-top: 15px;
  color: #3498db;
  font-size: 15px;
}
</style>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>福州第三十六中2024级八班班级网站</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background-color: #f7fafe;
      color: #333;
    }

    /* 导航栏 */
    header {
      background-color: #1677ff;
      color: white;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
      font-size: 16px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* 内容区域 */
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(22, 119, 255, 0.08);
    }

    .section h2 {
      color: #1677ff;
      margin-bottom: 16px;
      font-size: 20px;
      border-left: 4px solid #1677ff;
      padding-left: 10px;
    }

    /* 相册样式 */
    .album {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .album img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .album img:hover {
      transform: scale(1.03);
    }

    /* 文件下载 */
    .file-list {
      list-style: none;
    }

    .file-list li {
      padding: 10px 14px;
      border-bottom: 1px solid #eee;
    }

    .file-list li a {
      color: #1677ff;
      text-decoration: none;
    }

    .file-list li a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <header>
    <div class="title">福州第三十六中2024级八班班级网站</div>
    <nav>
      <a href="#home">首页</a>
      <a href="#album">班级相册</a>
      <a href="#files">文件资料</a>
    </nav>
  </header>

  <div class="container">

    <!-- 首页介绍 -->
    <div class="section" id="home">
      <h2>班级介绍</h2>
      <p>欢迎来到福州第三十六中学2024级8班班级网站，这里记录我们的学习、活动与成长瞬间。</p>
    </div>
<div class="exam-countdown">
  <div class="exam-title">🎓 中考倒计时</div>
  <div class="time-box">
    <div class="time-item"><div class="time-num" id="day">0</div><div class="time-text">天</div></div>
    <div class="time-item"><div class="time-num" id="hour">0</div><div class="time-text">时</div></div>
    <div class="time-item"><div class="time-num" id="min">0</div><div class="time-text">分</div></div>
    <div class="time-item"><div class="time-num" id="sec">0</div><div class="time-text">秒</div></div>
  </div>
  <div class="slogan">全力以赴，未来可期 ✨</div>
</div>
       <!-- 班级相册 - 改成超链接按钮 -->
<div class="section" id="album">
  <h2>班级相册</h2>
  <p>点击下方按钮，进入查看全部班级活动照片。</p>
  <br>
  <!-- 核心：超链接跳转到 album 文件夹 -->
  <a href="album.html" class="nav-link" style="display:inline-block; background:#4285F4; color:#fff; padding:10px 22px; border-radius:10px; text-decoration:none; font-weight:bold; transition:all 0.3s;" onmouseover="this.style.backgroundColor='#3367D6'" onmouseout="this.style.backgroundColor='#4285F4'">📸 查看我的相册</a>
</div>
    <!-- 文件资料 -->
    <div class="section" id="files">
      <h2>文件资料</h2>
      <ul class="file-list">
        <li><a href="files/班级通知.docx" target="_blank">班级通知.docx</a></li>
        <li><a href="files/课程表.xlsx" target="_blank">课程表.xlsx</a></li>
        <li><a href="files/活动照片合集.zip" target="_blank">活动照片合集.zip</a></li>
      </ul>
    </div>

  </div>

  <footer>
    福州第三十六中学2024级8班 © 2026
  </footer>
<script>
const examDate = new Date("2025-06-15 09:00:00").getTime();
function update(){
  const now = new Date().getTime();
  const diff = examDate - now;
  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);
  document.getElementById("day").innerText = d < 0 ? 0 : d;
  document.getElementById("hour").innerText = h < 0 ? 0 : h;
  document.getElementById("min").innerText = m < 0 ? 0 : m;
  document.getElementById("sec").innerText = s < 0 ? 0 : s;
}
update();
setInterval(update, 1000);
</script>
</body>
</html>
