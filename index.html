<script>
// 我已经帮你设置成：从今天算起 还剩73天！
const examDate = new Date("2026-06-23 09:00:00").getTime();

function update(){
  const now = new Date().getTime();
  const diff = examDate - now;
  const d = Math.floor(diff / (1000*60*60*24));
  const h = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
  const m = Math.floor((diff % (1000*60*60)) / (1000*60));
  const s = Math.floor((diff % (1000*60)) / 1000);
  
  document.getElementById("day").innerText = d < 0 ? 0 : d;
  document.getElementById("hour").innerText = h < 0 ? 0 : h;
  document.getElementById("min").innerText = m < 0 ? 0 : m;
  document.getElementById("sec").innerText = s < 0 ? 0 : s;
}
update();
setInterval(update, 1000);
</script>

function showNewQuote() {

  <script>c
function toggleDark() {
  const body = document.body;
  const btn = document.getElementById("darkBtn");
  const quoteBox = document.getElementById("quoteBox");
  
  body.classList.toggle("dark");
  
  if (body.classList.contains("dark")) {
    body.style.background = "#1a1a1a";
    body.style.color = "#fff";
    quoteBox.style.background = "#2c2c2c";
    quoteBox.style.boxShadow = "0 8px 24px rgba(0,0,0,0.4)";
    btn.innerText = "浅色模式";
  } else {
    body.style.background = "#fff";
    body.style.color = "#000";
    quoteBox.style.background = "linear-gradient(135deg, #f8f9ff, #f0f9ff)";
    quoteBox.style.boxShadow = "0 8px 24px rgba(45, 125, 210, 0.15)";
    btn.innerText = "深色模式";
  }
}
</script>
