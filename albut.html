<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班级相册 - 福州第三十六中2024级八班</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      background-color: #f7fafe;
      color: #333;
    }

    header {
      background-color: #1677ff;
      color: white;
      padding: 16px 20px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 12px;
      font-size: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .section {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(22, 119, 255, 0.08);
    }

    .section h2 {
      color: #1677ff;
      margin-bottom: 16px;
      font-size: 20px;
      border-left: 4px solid #1677ff;
      padding-left: 10px;
    }

    .album {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .album img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <header>
    <div class="title">班级相册</div>
    <nav>
      <a href="index.html">返回首页</a>
    </nav>
  </header>

  <div class="container">
    <div class="section">
      <h2>全部班级照片</h2>
      <div class="album">

        <!-- 你所有的照片 全部放这里！！ -->

        <img src="微信图片_20260408201213_11_14.jpg">
        <img src="1.jpg">
        <img src="2.jpg">
        <img src="3.jpg">
        <img src="4.jpg">
        <img src="5.jpg">
        <img src="6.jpg">
         <img src="01.png">
         <img src="6.jpg">

        <!-- 以后你上传几百张都在这里加 img 就行 -->

      </div>
    </div>
  </div>

</body>
</html>
